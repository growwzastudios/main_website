    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load Inter font once, globally, with font-display:swap for fast render -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload the most important above-the-fold images -->
    <link rel="preload" as="image" href="/showCase4.png" fetchpriority="high" />
    <link rel="preload" as="image" href="/showCase3.png" />

    <!-- DNS prefetch for external links opened by users -->
    <link rel="dns-prefetch" href="https://www.wakeupuae.com" />
    <link rel="dns-prefetch" href="https://www.artbypurvishah.com" />
    <link rel="dns-prefetch" href="https://zigis.com.au" />
